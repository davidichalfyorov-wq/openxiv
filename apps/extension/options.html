<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>OpenXiv overlay — options</title>
    <style>
      body { font-family: -apple-system, sans-serif; padding: 16px; max-width: 360px; }
      label { display: block; margin-bottom: 6px; font-size: 13px; color: #444; }
      input { width: 100%; padding: 8px; box-sizing: border-box; font-family: inherit; }
      button { margin-top: 10px; padding: 8px 14px; }
      .ok { color: #2d6b4a; margin-top: 8px; font-size: 13px; }
    </style>
  </head>
  <body>
    <h1>OpenXiv overlay</h1>
    <label>OpenXiv API base URL</label>
    <input id="apiBase" type="text" value="http://localhost:4000" />
    <button id="save">Save</button>
    <p id="status" class="ok"></p>
    <script src="options.js"></script>
  </body>
</html>
