name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Typecheck · Lint · Unit tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22', '24']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build workspace packages
        run: |
          pnpm --filter @openxiv/shared build
          pnpm --filter @openxiv/lexicons build
          pnpm --filter @openxiv/db build
          pnpm --filter @openxiv/clients build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  e2e:
    name: End-to-end (docker-compose)
    runs-on: ubuntu-latest
    needs: [unit]
    if: github.event_name == 'push'
    # The e2e job spins up the full docker-compose stack (Postgres, Redis,
    # MinIO, GROBID, api, worker, web) and runs Playwright against it.
    # It is informational only on the hosted GitHub runners until the
    # stack is hardened to come up cleanly without operator-provided env.
    # Unit tests remain the blocking signal.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build & start stack
        run: |
          docker compose up -d --build postgres redis minio minio-init grobid api worker web
          # wait for web to be reachable
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:4321 >/dev/null; then echo ready; break; fi
            sleep 2
          done
          curl -fsS http://localhost:4000/health

      - name: Install Playwright browsers
        run: pnpm --filter @openxiv/e2e install:browsers

      - name: Run E2E
        run: pnpm test:e2e
        env:
          E2E_BASE_URL: http://localhost:4321

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --tail=400

      - name: Tear down
        if: always()
        run: docker compose down -v
